<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Auth Callback</title>
    <style>
      body { font-family: Segoe UI, Tahoma, sans-serif; background: #121212; color: #fff; margin: 0; min-height: 100vh; display: grid; place-items: center; }
      .card { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2); padding: 28px; border-radius: 14px; max-width: 560px; text-align: center; }
      .err { color: #ff7676 }
      .muted { color: #b3b3b3 }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Completing Spotify sign‑in…</h2>
      <p id="msg" class="muted">Please wait while we finalize authentication.</p>
      <p id="err" class="err" style="display:none"></p>
    </div>

    <script>
      async function exchange() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const errEl = document.getElementById('err');
        const msgEl = document.getElementById('msg');
        if (error) {
          errEl.style.display = 'block';
          errEl.textContent = 'Spotify error: ' + error;
          msgEl.textContent = 'We could not complete sign‑in.';
          return;
        }
        if (!code) {
          errEl.style.display = 'block';
          errEl.textContent = 'Missing authorization code in callback.';
          msgEl.textContent = 'Please try signing in again.';
          return;
        }
        try {
          const verifier = localStorage.getItem('spotify_code_verifier');
          if (!verifier) throw new Error('Missing PKCE code verifier. Start sign‑in again.');
          const body = new URLSearchParams({
            client_id: '2e5babb7dcf346cb82db7ed7fb07e84b',
            grant_type: 'authorization_code',
            code,
            redirect_uri: 'http://127.0.0.1:8000/callback.html',
            code_verifier: verifier
          });
          const res = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body
          });
          if (!res.ok) throw new Error('Token exchange failed: ' + (await res.text()))
          const data = await res.json();
          localStorage.setItem('spotify_token_data', JSON.stringify({ access_token: data.access_token, expires_in: data.expires_in || 3600, timestamp: Date.now() }));
          // Signal to the app that auth just succeeded so it can resume post-auth flow
          try { sessionStorage.setItem('spotify_auth_success', '1'); } catch (_) {}
          msgEl.textContent = 'Sign‑in successful! Redirecting…';
          setTimeout(()=>{ window.location.href = '/src/frontend/html/index.html'; }, 800);
        } catch (e) {
          errEl.style.display = 'block';
          errEl.textContent = e.message;
          msgEl.textContent = 'We could not complete sign‑in.';
        }
      }
      exchange();
    </script>
  </body>
</html>
